<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio gear layout</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-brand">
      <h1>Audio gear layout</h1>
      <nav>
        <a href="port-types.html" class="nav-link">Port types</a>
        <a href="device-types.html" class="nav-link">Device types</a>
      </nav>
    </div>
    <div class="toolbar-main">
      <div class="toolbar toolbar-row-main">
        <span class="toolbar-group">
          <label for="add-device-select" class="toolbar-label">Add device</label>
          <select id="add-device-select" class="toolbar-select" aria-label="Add device type">
            <option value="">— choose type —</option>
            <option value="dac">DAC</option>
            <option value="amp">Amp</option>
            <option value="speaker">Speaker</option>
          </select>
        </span>
        <span class="toolbar-group">
          <button type="button" id="btn-delete">Delete device</button>
          <button type="button" id="btn-remove-cable" disabled>Sever Connection</button>
        </span>
        <span class="toolbar-group">
          <button type="button" id="btn-toggle-save-load" class="toolbar-toggle" aria-expanded="false" aria-controls="toolbar-save-load" title="Show save and load options">Save & load</button>
        </span>
      </div>
      <div id="toolbar-save-load" class="toolbar toolbar-save-load" role="region" aria-label="Save and load layout" hidden>
        <span class="toolbar-group">
          <label for="storage-mode-select" class="toolbar-label">Save/Load From</label>
          <select id="storage-mode-select" class="toolbar-select" aria-label="Storage: Server or Device">
            <option value="server">Server</option>
            <option value="local">Device</option>
          </select>
        </span>
        <span class="toolbar-group">
          <input type="text" id="layout-name" class="toolbar-input" placeholder="Layout name" value="Untitled layout" aria-label="Layout name" />
          <button type="button" id="btn-save">Save</button>
          <button type="button" id="btn-new">New layout</button>
        </span>
        <span class="toolbar-group">
          <label for="load-layout-select" class="toolbar-label">Load</label>
          <select id="load-layout-select" class="toolbar-select" aria-label="Load saved layout">
            <option value="">— Select to load —</option>
          </select>
          <button type="button" id="btn-delete-layout" disabled title="Delete current layout">Delete layout</button>
        </span>
      </div>
    </div>
  </header>

  <aside id="ports-editor" class="ports-editor hidden" aria-label="Ports for selected device">
    <p class="ports-editor-label">—</p>
    <label for="ports-inputs">Input ports (comma-separated)</label>
    <input type="text" id="ports-inputs" placeholder="e.g. Phono, Line In" />
    <label for="ports-outputs">Output ports (comma-separated)</label>
    <input type="text" id="ports-outputs" placeholder="e.g. Out L, Out R" />
    <button type="button" id="btn-apply-ports">Apply</button>
  </aside>
  <main class="canvas-wrapper">
    <div id="canvas-message" class="canvas-message" role="status" aria-live="polite"></div>
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="currentColor" />
        </marker>
      </defs>
      <g id="devices-layer"></g>
      <g id="cables-layer"></g>
      <line id="rubber-band" class="rubber-band" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowhead)" />
    </svg>
  </main>

  <script src="js/port-type-default.js"></script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
