<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port types — Audio gear layout</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/device-types.css" />
</head>
<body>
  <header>
    <h1>Port types</h1>
    <nav>
      <a href="device-types.html" class="nav-link">Device types</a>
      <a href="index.html" class="nav-link">← Layout</a>
    </nav>
  </header>

  <main class="device-types-page">
    <section class="section">
      <h2>Port types</h2>
      <p class="hint">Define port types (name, type slug, color) for use in device types. Ports with the same type can be connected. The default “Audio” type is always available.</p>
      <ul id="port-type-list" class="type-list"></ul>
    </section>

    <section class="section form-section">
      <h2 id="form-title">Add port type</h2>
      <form id="port-type-form">
        <input type="hidden" id="port-type-id" />
        <div class="field">
          <label for="port-type-name">Name</label>
          <input type="text" id="port-type-name" required placeholder="e.g. Audio" />
        </div>
        <div class="field">
          <label for="port-type-slug">Type (slug, used in ports)</label>
          <input type="text" id="port-type-slug" required placeholder="e.g. audio" />
        </div>
        <div class="field">
          <label for="port-type-color">Color (hex)</label>
          <input type="text" id="port-type-color" placeholder="#6b9b6b" />
          <input type="color" id="port-type-color-picker" value="#6b9b6b" style="margin-left: 0.5rem; vertical-align: middle; height: 2rem; padding: 0; border: none; cursor: pointer;" />
        </div>
        <div class="form-actions">
          <button type="submit" id="btn-save-local">Save locally</button>
          <button type="button" id="btn-save-server">Save to server</button>
          <button type="button" id="btn-export-json">Export JSON</button>
          <label class="file-label"><input type="file" id="import-file" accept=".json" /> Import JSON</label>
          <button type="button" id="btn-clear-form">Clear form</button>
        </div>
      </form>
    </section>
  </main>

  <script src="js/port-type-default.js"></script>
  <script src="js/port-types.js" type="module"></script>
</body>
</html>
