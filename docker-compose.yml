services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: layout
      POSTGRES_PASSWORD: layout
      POSTGRES_DB: audio_gear_layout
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "7432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U layout -d audio_gear_layout"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://layout:layout@postgres:5432/audio_gear_layout
    volumes:
      # Live code: edits on host are used without rebuild; uvicorn --reload restarts on change
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7001:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    volumes:
      # Live code: edits on host are served immediately by nginx (refresh browser to see changes)
      - ./frontend:/usr/share/nginx/html
    ports:
      - "7000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
